# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  The list subcommand. Lists specs discovered in .yass.yaml files,
  showing spec names with file paths and truncated preamble descriptions.
version: v1
---
spec: cli.list
INPUT:
- MUST: accept an optional file path to list specs in a single file
- MUST: accept an optional directory path to list specs in a subtree
- WHEN: no path is provided
  MUST: discover .yass.yaml files from the project root
  USES: ./cli.shared@cli.DiscoverSpecFiles
- MUST: "route every input (positional or default) through cli.shared@cli.DiscoverSpecFiles for path-existence, extension, and filesystem-error checks"
  USES: ./cli.shared@cli.DiscoverSpecFiles
- MUST-NOT: "recognize the bare `-` token as a stdin marker; MUST treat `-` as a literal path argument"
- WHEN: any positional path argument contains a literal `:` character
  MUST: "reject the invocation with error code yass.path.colon_in_path and exit 2"
RETURN:
- MUST: emit one line per spec
- MUST: separate fields with a single tab character
- MUST: emit the file path as the first field
- MUST: emit the spec name as the second field
- MUST: emit a truncated preamble description as the third field
- MUST: replace every run of whitespace including newlines and tabs in the description with a single ASCII space before emission
- MUST: strip leading and trailing whitespace from the normalized description
- MUST: replace any literal tab character in the file-path field with a single ASCII space
- MUST: emit description text in NFC-normalized UTF-8
- WHEN: the preamble omits description, has an empty description, or has a non-string description
  MUST: emit an empty third field while still emitting both tab separators
- MUST-NOT: skip the row or emit fewer than two tab separators
- WHEN: stdout is a terminal
  MUST: "truncate the description on a grapheme-cluster boundary using the three-character ASCII string `...` as the truncation marker so the line fits the terminal width"
- WHEN: stdout is a terminal
  MUST: measure line length as file-path length in grapheme clusters plus one column per tab separator plus spec-name length plus description length, treating tab as one display column
- WHEN: stdout is a terminal and the description was actually shortened
  MUST: emit the truncation marker
- WHEN: stdout is a terminal and the normalized description is empty
  MUST-NOT: append the truncation marker
- WHEN: stdout is a terminal and file-path-plus-name-plus-separators-plus-marker meets or exceeds the width
  MUST: emit an empty third field with no marker
- WHEN: stdout is a terminal and the COLUMNS environment variable is set to a string parseable as an integer greater than zero
  MUST: use that integer as the terminal width
- WHEN: stdout is a terminal and COLUMNS is unset, empty, non-numeric, or not greater than zero
  MUST: query the terminal width from the operating system
- WHEN: stdout is a terminal and the operating-system query fails or returns a value not greater than zero
  MUST: default to 80 columns
- WHEN: stdout is not a terminal
  MUST-NOT: truncate the description
- MUST: preserve document order of specs within each file
- MUST: sort files by Unicode code-point order on the NFC-normalized UTF-8 path string
- MUST-NOT: use locale-aware collation
- MUST-NOT: case-fold paths before sorting
- MUST: terminate every emitted row including the last with exactly one LF
- WHEN: a file contains zero Spec documents
  MUST: emit no rows for that file
  USES: yass@Document
- WHEN: a file contains zero Spec documents
  MUST-NOT: emit an error for that file
- WHEN: no .yass.yaml files are found in the search scope
  MUST: exit 0 and emit no output
- WHEN: at least one discovered file fails to parse as YAML
  MUST: exit 1 after listing all parseable specs
- WHEN: every discovered file parses successfully
  MUST: exit 0 regardless of whether any rows were emitted
- CONFORMS: ./cli@cli.ExitCode::RETURN
ERROR:
- MUST: error with code yass.path.not_found and exit 2 when a provided path does not exist
- WHEN: a provided file is not a .yass.yaml file
  MUST: "error with code yass.path.bad_extension and exit 2 with a message indicating the expected `.yass.yaml` extension"
- WHEN: a discovered file cannot be parsed as YAML
  MUST: write one ErrorLine with code yass.yaml.malformed to stderr and continue listing remaining files
  CONFORMS: ./cli@cli.ErrorLine::RETURN
SIDE-EFFECT:
- MUST: write output to stdout
- MUST: write error messages to stderr
  CONFORMS: ./cli@cli.ErrorLine::RETURN
- MUST-NOT: modify any file
INVARIANT:
- MUST-NOT: parse or validate obligation content
- MUST-NOT: resolve any refs
