# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  The validate subcommand. Validates one or more .yass.yaml files against
  the yass v1 schema and grammar rules. Checks well-formedness of YAML,
  schema conformance, preamble rules, spec name uniqueness, and ref target
  resolution. Does not verify obligation content.
version: v1
---
spec: cli.validate
INPUT:
- MUST: accept one or more file or directory paths as positional arguments
- MUST: resolve positional file paths relative to the current working directory
- WHEN: an argument contains glob metacharacters
  MUST: expand it via cli.shared@cli.ExpandGlob
  USES: ./cli.shared@cli.ExpandGlob
- WHEN: a positional argument is an existing directory
  MUST: recursively discover .yass.yaml files within it via cli.shared@cli.DiscoverSpecFiles
  USES: ./cli.shared@cli.DiscoverSpecFiles
- WHEN: a positional argument is an existing file
  MUST: "validate it directly, erroring with yass.path.bad_extension when it does not have the `.yass.yaml` suffix"
- MUST: resolve glob expansion before the file-vs-directory distinction
- WHEN: no file paths are provided
  MUST: discover .yass.yaml files from the project root
  USES: ./cli.shared@cli.DiscoverSpecFiles
- MUST: deduplicate the input file set by lexically-normalized absolute path before processing
- MUST-NOT: process the same file twice in a single invocation
- MUST-NOT: "recognize the bare `-` token as a stdin marker; MUST treat `-` as a literal path argument"
- WHEN: any positional path argument contains a literal `:` character
  MUST: "reject the invocation with error code yass.path.colon_in_path and exit 2"
RETURN:
- MUST: emit each validation error as an ErrorLine carrying the file path, optional line, error code, and human-readable message
  CONFORMS: ./cli@cli.ErrorLine::RETURN
- MUST: validate YAML well-formedness before running structural checks on a file
  USES: cli.validate.CheckYAML
- MUST: validate preamble structure after YAML parsing succeeds
  USES: cli.validate.CheckPreamble
- MUST: validate each spec document structure
  USES: cli.validate.CheckSpec
- MUST: validate spec name uniqueness within each file
  USES: cli.validate.CheckUniqueness
- MUST: validate reference target resolution
  USES: cli.validate.CheckRefs
- MUST: process files sequentially in cli.shared@cli.DiscoverSpecFiles sort order
- MUST: run checks per file in the order CheckYAML, CheckPreamble, CheckSpec, CheckUniqueness, CheckRefs
- MUST: "emit error lines in (file, line, column) ascending order within each file"
- MUST-NOT: interleave errors from different files
- WHEN: YAML parsing fails for a file
  MUST: skip CheckPreamble, CheckSpec, CheckUniqueness, and CheckRefs for that file
- MUST: count every CheckYAML error toward M
- MUST: count a CheckYAML failure as exactly one error per file regardless of how many sub-failures the parser reports
- MUST: count M as the number of error lines emitted to stderr
- MUST: emit exactly one error line per detected violation
- MUST-NOT: deduplicate errors across files or refs
- MUST: report all errors found rather than stopping at the first error
- MUST: continue checking remaining files when one file fails any check
- WHEN: one or more validation errors are found across all checked files
  MUST: exit 1
- CONFORMS: ./cli@cli.ExitCode::RETURN
ERROR:
- MUST: error with code yass.discover.no_files and exit 2 when no .yass.yaml files are found after argument expansion and discovery
- MUST: error with code yass.path.not_found and exit 2 when a provided path does not exist
- MUST: error with code yass.path.bad_extension and exit 2 when a provided file path is not a .yass.yaml file
- MUST: error with code yass.path.unreadable and exit 2 when a file cannot be read due to a filesystem error such as permission denied
- WHEN: a glob-expanded path is not a .yass.yaml file
  MUST: skip it silently rather than treating it as an error
SIDE-EFFECT:
- MUST: write validation errors to stderr
  CONFORMS: ./cli@cli.ErrorLine::RETURN
- MUST: "write a summary line to stdout in the format `checked <N> files, found <M> errors`"
- MUST: count every file the discovery returned toward N, including files that subsequently failed read or parse
- MUST: emit the summary line in all terminal cases including when no files were checked
- WHEN: no files were checked
  MUST: "emit `checked 0 files, found 0 errors`"
- MUST: flush all stderr error lines before writing the stdout summary line
- MUST: emit the summary line as the final byte sequence written to any stream
- MUST-NOT: modify any input file
INVARIANT:
- MUST: enforce only MUST and MUST-NOT obligations from the yass language specification as errors in v1
- MUST-NOT: emit warnings for SHOULD or SHOULD-NOT obligations in v1
- MUST-NOT: count SHOULD violations toward M
- MUST-NOT: verify obligation prose content
- MUST-NOT: resolve or fetch preamble related entries
  USES: yass@Preamble
- MUST: treat the union of CheckYAML, CheckPreamble, CheckSpec, CheckUniqueness, and CheckRefs ERROR obligations as exhaustive in v1
- MUST: use cli.FindProjectRoot to establish the project root for ref resolution when validating any file
  USES: ./cli.shared@cli.FindProjectRoot
- MUST: compute the project root exactly once at startup using the current working directory as the starting point
- MUST-NOT: recompute the project root per file
- WHEN: cli.FindProjectRoot fails
  MUST: "emit one ErrorLine `<cwd>: [yass.findroot.no_marker] no project root marker found` to stderr and exit 2 before checking any file"
- MUST-NOT: silently fall back to cwd as the project root
- MUST-NOT: take any advisory or mandatory lock on input files
- MUST: treat a torn-read result as a CheckYAML well-formedness error
- MUST-NOT: implement any draft-mode, skip-pattern, or ignore-file mechanism in v1
---
spec: cli.validate.CheckYAML
INPUT:
- MUST: accept a single file path
RETURN:
- WHEN: the file is well-formed YAML
  MUST: return success
ERROR:
- MUST: error with code yass.yaml.not_utf8 when the file is not valid UTF-8
- MUST: error with code yass.yaml.has_bom when the file begins with a UTF-8 BOM
- MUST: error with code yass.yaml.empty_file when the file is zero bytes
- MUST: error with code yass.yaml.malformed when the file is not well-formed YAML 1.2
- MUST: error with code yass.yaml.duplicate_key when a mapping contains duplicate keys
- MUST: error with code yass.yaml.anchor_or_alias when a YAML anchor, alias, or non-default tag is present
INVARIANT:
- USES: yass@Document
- MUST: emit at most one error per file, preferring yass.yaml.not_utf8, then yass.yaml.has_bom, then yass.yaml.empty_file, then yass.yaml.malformed, then yass.yaml.duplicate_key, then yass.yaml.anchor_or_alias
- MUST: count an empty-file failure as exactly one CheckYAML error in M
---
spec: cli.validate.CheckPreamble
INPUT:
- MUST: accept a parsed YAML multi-document stream
  USES: cli.validate.CheckYAML
RETURN:
- WHEN: the first document is a valid Preamble
  MUST: return success
ERROR:
- MUST: "error with code yass.preamble.has_spec_key when the first document contains a `spec` key"
- MUST: error with code yass.preamble.missing when no Preamble is present
- MUST: error with code yass.preamble.misplaced when a Preamble appears at any position other than first, attributing the error to the line of the misplaced Preamble
- MUST: error with code yass.preamble.duplicate when more than one Preamble is present
- MUST: error with code yass.preamble.missing_description when the Preamble omits description
- MUST: error with code yass.preamble.missing_version when the Preamble omits version
- MUST: error with code yass.preamble.unknown_version when the Preamble version is not the exact string v1
- MUST: error with code yass.preamble.bad_related when the related key is present and is not a sequence of strings
- MUST: error with code yass.yaml.empty_stream when the parsed YAML stream contains zero documents
INVARIANT:
- USES: yass@Preamble
- MUST: "emit at most one error per file in the order (1) yass.preamble.has_spec_key, (2) yass.yaml.empty_stream, (3) yass.preamble.missing, (4) yass.preamble.duplicate, (5) yass.preamble.misplaced, (6) yass.preamble.missing_description, (7) yass.preamble.missing_version, (8) yass.preamble.unknown_version, (9) yass.preamble.bad_related, stopping at the first match"
---
spec: cli.validate.CheckSpec
INPUT:
- MUST: "accept a parsed YAML document that has a `spec` key"
  USES: cli.validate.CheckYAML
RETURN:
- WHEN: the document is a valid Spec
  MUST: return success
ERROR:
- MUST: "error with code yass.spec.no_name when a non-first YAML document does not contain a top-level `spec` key, attributing the error to the line where the document begins"
- MUST: error with code yass.spec.name_not_string when the spec name is not a string
- MUST: error with code yass.spec.name_empty when the spec name is empty
- MUST: error with code yass.spec.name_bad_chars when the spec name contains characters outside the allowed set
- MUST: "error with code yass.spec.name_bad_form when the spec name does not match the composition regex, begins or ends with `.`, or contains consecutive `.` characters"
- MUST: error with code yass.spec.name_reserved when the spec name case-insensitively matches a Slot or Normativity keyword
- MUST: "error with code yass.spec.unknown_key when a key other than `spec` is not a valid Slot key"
- MUST: error with code yass.slot.value_not_list when a valid Slot key has a value that is not a list
- MUST: error with code yass.obligation.bad_value_shape when an obligation value at a scalar position is a YAML mapping, sequence, or null
- MUST: error with code yass.obligation.missing_normativity_or_ref when an obligation carries neither a Normativity keyword nor a Reference
- MUST: error with code yass.obligation.guard_without_normativity when an obligation carries a WHEN guard but no Normativity keyword
- MUST: error with code yass.obligation.duplicate_reference when an obligation carries the same Reference relation key more than once
- MUST: error with code yass.obligation.duplicate_normativity when an obligation carries more than one Normativity keyword
- MUST: error with code yass.normativity.unknown when a Normativity keyword is outside the recognized set
- MUST: error with code yass.reference.unknown_relation when a Reference relation key is outside the recognized set
INVARIANT:
- USES: yass@Spec
- USES: yass@Obligation
- USES: yass@Normativity
- USES: yass@Reference
- MUST: emit one error per failing rule per obligation
---
spec: cli.validate.CheckUniqueness
INPUT:
- MUST: accept all parsed Spec documents from a single file
  USES: cli.validate.CheckSpec
RETURN:
- WHEN: all spec names are unique within the file
  MUST: return success
ERROR:
- MUST: error with code yass.spec.duplicate_name once per duplicate-after-the-first occurrence, pointing at the line of each subsequent occurrence
INVARIANT:
- USES: yass@Spec
---
spec: cli.validate.CheckRefs
INPUT:
- MUST: accept all parsed Spec documents from a single file
  USES: cli.validate.CheckSpec
- MUST: accept a base path for resolving relative ref targets
- MUST: accept a project root path for resolving root-relative ref targets
RETURN:
- WHEN: all ref targets resolve
  MUST: return success
ERROR:
- MUST: "first match the ref target against the RefTarget well-formedness grammar; on grammar failure MUST error with code yass.ref.malformed"
- SEE: yass@RefTarget::ERROR
- MUST: error with code yass.ref.unknown_slot when a ref target names a slot outside the recognized set
- WHEN: a ref target addresses the same file
  MUST: error with code yass.ref.spec_not_found_same_file when the target spec does not exist in that file
- WHEN: a ref target addresses another file
  MUST: error with code yass.ref.file_not_found when the referenced file does not exist
- WHEN: a ref target addresses another file
  MUST: error with code yass.ref.file_not_parseable when the referenced file cannot be parsed as YAML
- WHEN: a ref target addresses another file
  MUST: error with code yass.ref.spec_not_found_other_file when the referenced spec does not exist in the referenced file
- WHEN: "a ref target names a slot via `::SLOT`"
  MUST: error with code yass.ref.slot_not_declared when the referenced spec does not declare that slot in its source document
INVARIANT:
- USES: yass@Reference
- USES: yass@RefTarget
- MUST: open referenced files for existence and target-spec lookup only
- MUST-NOT: run CheckPreamble, CheckSpec, or CheckUniqueness on a file solely because it is referenced
- MUST-NOT: count referenced-only files toward N
- MUST: attribute every ref error to the referencing file using its line and column
- MUST: "emit at most one yass.ref.file_not_found or yass.ref.file_not_parseable error per (referencing-file, referenced-file) pair"
- MUST-NOT: perform cycle detection in v1
- MUST: allow a spec to CONFORMS to itself or to a cycle of specs since query resolves only one level deep
- MUST: emit one error per failing ref
