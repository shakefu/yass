# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Top-level CLI entry point for the yass tool. Parses global flags,
  selects a subcommand, and dispatches. Defines the exit-code contract
  all subcommands conform to, the error-line format every subcommand
  emits, and the output-profile invariants every subcommand inherits.
version: v1
---
spec: cli.Dispatch
INPUT:
- MUST: accept raw command-line arguments
- MUST-NOT: read from stdin
- MUST: recognize validate, query, and list as subcommands
- MUST: accept a --help flag that prints usage information
- MUST: accept a --version flag that prints the tool version
RETURN:
- WHEN: the subcommand is validate
  MUST: dispatch to the validate handler
  USES: ./cli.validate@cli.validate
- WHEN: the subcommand is query
  MUST: dispatch to the query handler
  USES: ./cli.query@cli.query
- WHEN: the subcommand is list
  MUST: dispatch to the list handler
  USES: ./cli.list@cli.list
- CONFORMS: cli.ExitCode::RETURN
ERROR:
- WHEN: the first positional argument does not match a known subcommand byte-for-byte
  MUST: print usage to stderr and exit 2 with code yass.argv.unknown_subcommand
- WHEN: no subcommand or global flag is provided
  MUST: print usage to stderr and exit 2 with code yass.argv.no_subcommand
- WHEN: "any flag other than `--help` or `--version` is given to the top-level command or any subcommand"
  MUST: print usage to stderr and exit 2 with code yass.argv.unknown_flag
- WHEN: a short-form flag is given
  MUST: print usage to stderr and exit 2 with code yass.argv.short_flag
- WHEN: a subcommand or flag is given in any case other than its canonical lowercase form
  MUST: print usage to stderr and exit 2 with code yass.argv.case_mismatch
- WHEN: a subcommand or flag is given as a prefix or abbreviation of its canonical form
  MUST: print usage to stderr and exit 2 with code yass.argv.abbreviation
- WHEN: any positional argument is the empty string
  MUST: print usage to stderr and exit 2 with code yass.argv.empty_argument
- WHEN: "a positional argument is the bare token `-`"
  MUST: print usage to stderr and exit 2 with code yass.argv.stdin_dash
SIDE-EFFECT:
- MUST: write subcommand output to stdout
- MUST: write error messages to stderr
  CONFORMS: cli.ErrorLine::RETURN
- WHEN: "`--help` appears anywhere in argv"
  MUST: print top-level usage information to stdout and exit 0
- WHEN: "`--version` appears anywhere in argv"
  MUST: "print the single line `yass <version>\n` to stdout where `<version>` is the contents of the repository VERSION file with no `v` prefix and no build metadata, then exit 0"
- MUST-NOT: "implement subcommand-specific `--help` in v1"
- MUST-NOT: "print anything other than `yass <version>\n` for `--version`"
INVARIANT:
- MUST: emit all stdout and stderr bytes as UTF-8
- MUST: emit LF (U+000A) as the only line terminator on stdout and stderr on all platforms
- MUST: end every emitted line including the last with exactly one LF
- MUST: line-buffer stdout regardless of TTY
- MUST: handle SIGPIPE by exiting 0 cleanly without writing further output
- MUST-NOT: emit ANSI escape codes, color, or terminal formatting on stdout or stderr
- MUST-NOT: emit progress, log, banner, or diagnostic lines to stdout or stderr
- MUST-NOT: page, alter, or otherwise transform output when stdout is a TTY
- MUST-NOT: write any line to stderr that does not conform to cli.ErrorLine::RETURN
  CONFORMS: cli.ErrorLine::RETURN
- MUST-NOT: emit structured JSON, NDJSON, or any other machine-readable output in v1
- MUST-NOT: "accept any subcommand flag other than `--help` and `--version` in v1"
- MUST-NOT: read from stdin in any subcommand in v1
- MUST-NOT: create, modify, or delete any file or directory outside the runtime process memory in v1
- MUST-NOT: write to temporary directories, caches, or configuration directories
- MUST-NOT: take any advisory or mandatory lock on input files
- MUST-NOT: spawn subprocesses or open network sockets
- MUST: "treat `--` as an end-of-options marker that causes remaining argv to be parsed as positionals"
- WHEN: any uncaught internal error occurs in a subcommand handler
  MUST: "emit one ErrorLine `yass: [yass.internal.uncaught] internal error: <message>` to stderr and exit 1"
- WHEN: the process receives SIGINT
  MUST: exit 130 without writing the summary line, after flushing any pending error lines
- WHEN: the process receives SIGTERM
  MUST: exit 143 without writing the summary line, after flushing any pending error lines
---
spec: cli.ExitCode
RETURN:
- MUST: exit 0 on success
- WHEN: any validation rule or processing rule is violated
  MUST: exit 1
- WHEN: any argv parse failure or file-input failure occurs
  MUST: exit 2
- WHEN: cli.FindProjectRoot finds no marker
  MUST: exit 2
- WHEN: a glob pattern matches zero files
  MUST: exit 2
- WHEN: no .yass.yaml files are discovered in the scope
  MUST: exit 2
- WHEN: query finds no spec matching the requested name
  MUST: exit 1
- WHEN: query fails to resolve a CONFORMS ref during inlining
  MUST: exit 1
- WHEN: list discovers at least one file that fails YAML parsing
  MUST: exit 1
- WHEN: the process receives SIGINT
  MUST: exit 130
- WHEN: the process receives SIGTERM
  MUST: exit 143
- WHEN: an uncaught internal error occurs in a subcommand handler
  MUST: exit 1
- MUST-NOT: use any exit code other than 0, 1, 2, 130, or 143 in v1
---
spec: cli.ErrorLine
RETURN:
- MUST: "format each error line with a known source line as `<file>:<line>: [<code>] <message>`"
- MUST: "format each error line without a known source line as `<file>: [<code>] <message>`"
- MUST: emit `<code>` as a machine-stable token from cli.errors
  USES: ./cli.errors@cli.errors
- MUST: "report `<line>` as the 1-based line of the offending YAML node in the file as stored on disk"
- MUST: emit one error per line, terminated by exactly one LF (U+000A)
- MUST-NOT: include ANSI escape codes or terminal formatting in error output
- MUST: "emit `<file>` as the path the file was reached by, not its realpath"
- MUST: "emit `<file>` as a path relative to the current working directory when the lexical absolute path begins with the lexical absolute cwd followed by `/`"
- MUST: "emit relative `<file>` paths without a leading `./`"
- MUST: "emit `<file>` as the basename alone when the file is directly inside the current working directory"
- WHEN: the file is not under the current working directory
  MUST: "emit `<file>` as an absolute path"
- MUST: emit forward slashes as the path separator on all platforms
- MUST-NOT: resolve symbolic links before deciding the path form
- WHEN: the error has no associated input file
  MUST: "emit the literal token `yass` as `<file>`"
- MUST: "replace any newline character in `<message>` with a single ASCII space before emission"
- MUST-NOT: "emit any input path containing the literal `:` character; such inputs MUST be rejected upstream as yass.path.colon_in_path"
