# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  scale audit: the audit subcommand and consumer of the run | audit pipeline. It
  reads the ticket lines that scale run writes to standard output, plus hand-fed
  REWEIGH lines, tallies every consumed line by overload class, and writes a
  five-line summary. It trusts the ticket text run produced and does not re-validate
  it. In audit input a blank line is a section break rather than a record, which
  overrides the shared segmentation rule that scale run still obeys.
version: v1
related:
- ./scale.shared.yass.yaml
- ./scale.run.yass.yaml
---
spec: scale.audit
INPUT:
- MUST: run when the program's first command-line argument is audit
- MUST: "treat each record of standard input as one line"
  USES: ./scale.shared@scale.lines
- WHEN: a line splits into zero fields, such as a blank or whitespace-only line
  MUST: "treat the blank line as a section break and skip it: count it toward no total, tally it into no class, and raise no error; this overrides the shared segmentation rule under which a blank line is a zero-field record, and the override is scoped to audit alone -- under the run subcommand the shared rule still holds and a blank line is the E10 malformed empty-line record"
- MUST: "distinguish the two consumed line types by the first field: a re-weigh line has the literal REWEIGH as its first field, and every other non-blank line is a ticket line"
- MUST: "read a ticket line as the text scale run writes -- `<id> TARE <number>`, `<id> NET <net>`, or `<id> <code> <message>` -- trusting the verdict text and tallying by it, and do not re-validate the identifier, the field count, or the number, nor re-derive the verdict"
  USES: ./scale.run@scale.run::RETURN
- CONFORMS: ./scale.run@scale.run
- MUST: "classify each ticket line by its second field against the overload registry and count it toward the ticket total: a second field of TARE or NET tallies the line as CLEAR, W01 as CRITICAL, W02 as MAJOR, and W03 or W04 as MINOR"
  CONFORMS: ./scale.shared@scale.defects::INVARIANT
- WHEN: a ticket line's second field is none of TARE, NET, W01, W02, W03, or W04, or the line has no second field
  MUST: "still count it toward the ticket total but tally it into no severity class"
- WHEN: a ticket line does not match the well-formed shape scale run guarantees, such as a line with an unexpected field count or an out-of-range-looking identifier
  MUST: "still trust it: count it toward the ticket total and classify it by its second field as above, never re-validating or rejecting it"
- MUST: "read a re-weigh line as `REWEIGH <id> <flag> <gross> <tare>`, exactly five fields where <flag> is Y or N, and count it toward the ticket total"
- WHEN: a re-weigh line is flagged Y and both its gross and tare fields are well-formed non-negative integers
  MUST: "re-derive the net weight from the line's own fields as net = gross minus tare, classify it against the overload registry, and tally it by the governing verdict's severity class, or as CLEAR when no verdict governs; a negative re-derived net, where gross is less than tare, governs no verdict here and is tallied as CLEAR, since the registry's net-below-zero case routes to the E50 error only in the run pipeline and audit raises no error and so has no such path"
  CONFORMS: ./scale.shared@scale.defects::INVARIANT
- WHEN: a re-weigh line is flagged N
  MUST: "tally the line as CLEAR without re-deriving any verdict"
- WHEN: a re-weigh line has a flag that is neither Y nor N, does not consist of exactly five fields, or is flagged Y but its gross or tare field is not a well-formed non-negative integer
  MUST: "treat it as not flagged: count it toward the ticket total, tally it as CLEAR, re-derive nothing, and never raise an error, because audit exits 0 by contract"
RETURN:
- MUST: "write exactly five lines to standard output in this order: `TICKETS <total>`, `CLEAR <clears>`, `CRITICAL <criticals>`, `MAJOR <majors>`, then `MINOR <minors>`, and exit with status 0"
- MUST: "set <total> to the number of consumed lines, counting every ticket line and every re-weigh line and excluding every skipped blank section-break line"
- MUST: set <clears> to the number of consumed lines tallied as CLEAR
- MUST: "set <criticals>, <majors>, and <minors> to the number of consumed lines tallied into the CRITICAL, MAJOR, and MINOR severity classes respectively"
  CONFORMS: ./scale.shared@scale.defects::INVARIANT
- WHEN: standard input contains no consumed lines, whether empty or only blank section-break lines
  MUST: "write the same five lines with every count equal to 0"
SIDE-EFFECT:
- MUST-NOT: "write to any file, network endpoint, or environment variable, and write nothing to standard error; read only standard input and write only standard output"
INVARIANT:
- MUST: always exit with status 0
- MUST: "classify every consumed line exhaustively: a re-weigh line flagged Y with well-formed gross and tare is tallied by its re-derived verdict, which is CLEAR whenever the registry governs no verdict, including a negative net; every other re-weigh line is tallied as CLEAR; every other non-blank line is a ticket line tallied by its second field, with a second field outside TARE, NET, W01, W02, W03, and W04 counted toward the ticket total but into no class; the residual set is empty, so no guard-less catch-all MUST be stated"
