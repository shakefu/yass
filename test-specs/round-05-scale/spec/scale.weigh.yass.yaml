# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  scale weigh: the WEIGH operation of the run subcommand. It reads one operation
  record whose keyword is WEIGH, derives the vehicle's net weight from its gross
  weight and the tare weight established by an earlier TARE, and writes one
  overload verdict line. A WEIGH depends on a prior TARE of the same vehicle:
  weighing a vehicle that has not been tared in this session is an error, because
  no tare weight exists to subtract.
version: v1
related:
- ./scale.shared.yass.yaml
- ./scale.tare.yass.yaml
- ./scale.run.yass.yaml
---
spec: scale.weigh
INPUT:
- MUST: "process a WEIGH operation record, whose first field -- the keyword -- is exactly WEIGH; the record is a well-formed operation record by the shared record format"
  CONFORMS: ./scale.shared@scale.record::INPUT
- MUST: "read the record's second field as the vehicle identifier and its third field as the gross weight, a well-formed non-negative integer"
- MUST: "require, before producing any verdict, that the session has already processed a TARE operation for this same vehicle identifier earlier in the input; this precondition is per identifier and is satisfied only by a prior TARE for the identical identifier, never by a prior TARE for any different identifier, and a WEIGH whose precondition is unmet yields no verdict"
  USES: ./scale.tare@scale.tare
RETURN:
- MUST: "compute the net weight as net, the gross weight minus the tare weight recorded for this vehicle identifier by its most recent prior TARE (net = gross minus tare[id])"
- MUST: "classify the net weight against the overload registry and write exactly one verdict line for the governing verdict to standard output, contributing that verdict's severity class to the exit status"
  CONFORMS: ./scale.shared@scale.defects::INVARIANT
ERROR:
- WHEN: a record is a well-formed WEIGH record by the shared record format but no TARE for its vehicle identifier has been processed earlier in the same session
  MUST: "emit `E40 weigh before tare: <id>` to standard error, where <id> is the vehicle identifier, write no standard-output line, and contribute to the exit status as a rejected record"
- WHEN: a record is a well-formed WEIGH record with a prior TARE for its vehicle identifier but its gross weight is less than the recorded tare weight, so the net weight would be negative
  MUST: "emit `E50 negative net: <id>` to standard error, where <id> is the vehicle identifier, write no standard-output line, and contribute to the exit status as a rejected record"
- USES: ./scale.shared@scale.errors
INVARIANT:
- MUST: "apply the E40 and E50 checks only after the shared record-format checks have accepted the record as a well-formed WEIGH, in the order E40 then E50, stopping at the first failure"
  USES: ./scale.shared@scale.record::ERROR
- MUST: "treat the error set E10, E25, E15, E20, E40, and E50 as exhaustive over every WEIGH input: every malformed, precondition-failing, or impossible weigh is rejected by exactly one of these named errors, and every other WEIGH is well-formed with a satisfied precondition and a non-negative net and yields exactly one verdict line; the residual set is empty, so no guard-less catch-all error obligation MUST be stated, since it could never fire"
