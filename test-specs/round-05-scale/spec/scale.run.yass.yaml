# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  scale run: the run subcommand and producer of the run | audit pipeline. It reads
  an operation stream from standard input, segments it into records, validates and
  dispatches each record to the TARE or WEIGH operation, writes one ticket line per
  successful operation to standard output and one error line per rejected record to
  standard error, and exits with the maximum severity contribution across all
  records.
version: v1
related:
- ./scale.shared.yass.yaml
- ./scale.tare.yass.yaml
- ./scale.weigh.yass.yaml
- ./scale.audit.yass.yaml
---
spec: scale.run
INPUT:
- MUST: run when the program's first command-line argument is run
- MUST: "segment standard input into records, and each record into fields, by the shared segmentation rule"
  USES: ./scale.shared@scale.lines
- MUST: "validate each record against the shared operation record format and reject a malformed record with its error before dispatching it, applying the E10, E25, E15, and E20 checks in their defined order"
  USES: ./scale.shared@scale.record::ERROR
- MUST: "dispatch each well-formed record by its keyword field over the closed set of exactly TARE and WEIGH: a TARE record to the scale.tare operation, a WEIGH record to the scale.weigh operation"
  USES: ./scale.tare@scale.tare
- USES: ./scale.weigh@scale.weigh
- WHEN: a record has one or more fields and its first field is neither TARE nor WEIGH
  MUST: "reject it as the E25 unknown-operation case defined by the shared record format and dispatch it to neither operation; the keyword closed set is exactly TARE and WEIGH"
  USES: ./scale.shared@scale.record::ERROR
RETURN:
- MUST: "process records in input order and write each record's resulting line in that order: a TARE acknowledgement or a WEIGH verdict to standard output, and a rejection to standard error"
- MUST: "exit with the maximum exit contribution taken over all records, where a CLEAR verdict or a TARE acknowledgement contributes 0, any rejected record contributes 1, a MINOR verdict contributes 1, a MAJOR verdict contributes 2, and a CRITICAL verdict contributes 3"
  CONFORMS: ./scale.shared@scale.defects::INVARIANT
- WHEN: standard input contains zero records
  MUST: "write nothing to standard output or standard error and exit with status 0"
ERROR:
- MUST: "write one error line per rejected record to standard error, and keep processing the remaining records after a record is rejected"
  USES: ./scale.shared@scale.errors
SIDE-EFFECT:
- MUST-NOT: "write to any file, network endpoint, or environment variable; read only standard input and write only standard output and standard error"
INVARIANT:
- MUST: "classify every record as exactly one of: a rejected record that yields one error line and no standard-output line, or a successful operation that yields exactly one standard-output line and no error line"
