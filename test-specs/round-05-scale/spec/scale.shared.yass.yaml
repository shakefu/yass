# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Shared conventions for the scale weighbridge ticket tool. The tool is one
  command-line program with two subcommands -- run and audit -- each of which
  reads standard input and writes standard output, so they can be chained with a
  shell pipe. This document is the single home for the cross-cutting rules every
  subcommand obeys: how the program selects a subcommand and what it does when the
  selection is absent or unknown, how a subcommand segments its standard input
  into records and fields, the layout of an operation record, the registry of
  overload verdicts with their severity classes, messages, and precedence, and the
  shape of a processing-error line.
version: v1
related:
- ./scale.tare.yass.yaml
- ./scale.weigh.yass.yaml
- ./scale.run.yass.yaml
- ./scale.audit.yass.yaml
---
spec: scale
INPUT:
- MUST: read all of standard input before writing any output
- MUST: "select a subcommand from the closed set of exactly run and audit using the first command-line argument"
- WHEN: the first command-line argument is present and is exactly run or audit
  MUST: "run that subcommand: run as defined by the scale.run spec, and audit as defined by the scale.audit spec"
- SEE: ./scale.run@scale.run
- SEE: ./scale.audit@scale.audit
ERROR:
- WHEN: the first command-line argument is missing, or is any token other than exactly run or audit -- including an unknown word, a wrong-case token such as RUN or AUDIT, or a bare hyphen, which the closed-set dispatch governs with no stdin-convention exception
  MUST: "write the line `usage: scale {run|audit}` to standard error, write nothing to standard output, and exit with status 2"
INVARIANT:
- MUST: "terminate every line written to standard output or standard error with a single newline byte (0x0A), and write no other line-terminator byte"
- MUST: "echo any input-derived text in a message, such as a rejected field or a vehicle identifier, byte-for-byte exactly as it was read"
---
spec: scale.lines
INPUT:
- MUST: "read the entire standard input as raw bytes and preserve every byte exactly, so that bytes which are not valid UTF-8 round-trip unchanged to any output"
- WHEN: standard input is completely empty, containing zero bytes
  MUST: treat it as zero records and perform no splitting
- MUST: "when the input is non-empty and its final byte is a single newline (0x0A), strip exactly that one trailing newline before splitting; strip no more than one, so that a second trailing newline leaves a final empty record"
- MUST: "split the remaining bytes into records on each single newline byte (0x0A); each record is the text between newlines, in input order"
- MUST: "treat an input consisting of exactly one newline byte as one record with zero fields, because stripping its single trailing newline leaves an empty remainder that splits into exactly one empty record"
- MUST: "treat a record that splits into zero fields, such as a blank line or a whitespace-only line, as a record with zero fields"
- MUST: "split a record into fields on runs of one or more ASCII space bytes (0x20), discarding leading and trailing ASCII spaces, so that no empty field is produced and an interior run of spaces collapses to a single field boundary"
- MUST-NOT: "treat any byte other than the ASCII space (0x20) -- including the tab (0x09) and the carriage return (0x0D) -- as a field separator; any such byte is ordinary field data"
---
spec: scale.record
INPUT:
- MUST: "interpret a well-formed operation record as exactly three fields in this order, written `<KEYWORD> <id> <number>`: a keyword, a vehicle identifier, and a non-negative integer weight"
- MUST: "treat the keyword as well-formed only when it is exactly TARE or exactly WEIGH, compared case-sensitively"
- MUST: "treat a vehicle identifier as well-formed only when it is 3 to 10 characters long, its first character is an ASCII uppercase letter (A-Z), and every character is an ASCII uppercase letter (A-Z) or an ASCII digit (0-9)"
- MUST: "treat the number as well-formed only when it is a non-empty run of ASCII digits (0-9) with no leading zero, unless the field is the single digit 0"
ERROR:
- WHEN: a record splits into zero fields, such as a blank or whitespace-only line
  MUST: "emit `E10 malformed record: empty line` to standard error and write no standard-output line for that record"
- WHEN: a record has one or more fields and its first field is neither TARE nor WEIGH
  MUST: "emit `E25 unknown operation: <field1>` to standard error, where <field1> is the record's first field exactly as read, and write no standard-output line for that record"
- WHEN: a record's first field is exactly TARE and the record does not have exactly three fields
  MUST: "emit `E10 malformed record: TARE expects 3 fields, got <n>` to standard error, where <n> is the record's actual field count, and write no standard-output line for that record"
- WHEN: a record's first field is exactly WEIGH and the record does not have exactly three fields
  MUST: "emit `E10 malformed record: WEIGH expects 3 fields, got <n>` to standard error, where <n> is the record's actual field count, and write no standard-output line for that record"
- WHEN: a record has exactly three fields and a well-formed keyword but its second field is not a well-formed vehicle identifier
  MUST: "emit `E15 bad vehicle id: <field2>` to standard error, where <field2> is the record's second field exactly as read, and write no standard-output line for that record"
- WHEN: a record has exactly three fields, a well-formed keyword, and a well-formed vehicle identifier but its third field is not a well-formed non-negative integer
  MUST: "emit `E20 bad number: <field3>` to standard error, where <field3> is the record's third field exactly as read, and write no standard-output line for that record"
- USES: scale.errors
INVARIANT:
- MUST: "classify every record as exactly one of the following: rejected by exactly one of the E10 empty-line, E25 unknown-operation, E10 field-count, E15 identifier, or E20 number checks above; or well-formed -- a TARE or WEIGH record of exactly three fields with a well-formed identifier and a well-formed number"
- MUST: "treat the record-format checks as exhaustive over every record: each record either fails exactly one named check or is well-formed, so the residual set is empty and no guard-less catch-all error obligation MUST be stated, since it could never fire"
---
spec: scale.defects
INVARIANT:
- MUST: "evaluate the overload registry for a well-formed weigh on its net weight, net, which is the gross weight minus the stored tare weight for the vehicle and is always greater than or equal to zero; a net weight below zero is never a verdict but the E50 error"
- MUST: "W01 is a CRITICAL verdict: its condition is net greater than 44000, and its verdict line is `<id> W01 critical overload above 44000`"
- MUST: "W02 is a MAJOR verdict: its condition is net greater than 40000, and its verdict line is `<id> W02 major overload above 40000`"
- MUST: "W03 is a MINOR verdict: its condition is net greater than 36000, and its verdict line is `<id> W03 minor overload above 36000`"
- WHEN: the gross weight is greater than 50000
  MUST: "W04 is a MINOR verdict: its condition is net greater than 30000, and its verdict line is `<id> W04 heavy vehicle net above 30000`"
- MUST: "when no W01, W02, W03, or W04 verdict governs, the result is CLEAR and its verdict line is `<id> NET <net>`, where <net> is the computed net weight"
- MUST: "when more than one verdict condition holds for the same weigh, the governing verdict is the first match in this fixed precedence order, highest first: W01, W02, W03, W04; so a net greater than 36000 with a gross greater than 50000 matches both W03 and W04 and is governed by W03"
- MUST: "rank the severity classes for exit purposes as CRITICAL above MAJOR above MINOR above CLEAR, with exit contributions 3 for a CRITICAL verdict (W01), 2 for a MAJOR verdict (W02), 1 for a MINOR verdict (W03 or W04), and 0 for a CLEAR result"
- MUST: "treat W01, W02, W03, and W04 together with CLEAR as exhaustive over every net weight greater than or equal to zero, so there is no residual verdict and no guard-less catch-all verdict MUST be stated"
---
spec: scale.errors
INVARIANT:
- MUST: "write every processing-error line to standard error as an error code, a single ASCII space, then a human-readable message, terminated by one newline byte: `<code> <message>`"
- MUST: write at most one processing-error line for any single input record
