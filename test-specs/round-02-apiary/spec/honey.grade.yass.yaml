# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  honey grade: the second pipeline stage. It reads the harvest records produced
  by honey tally from standard input, computes each hive's net weight and grade
  band, and writes a graded record for every accepted hive to standard output
  for the pack stage to read.
version: v1
related:
- ./honey.shared.yass.yaml
- ./honey.tally.yass.yaml
- ./honey.pack.yass.yaml
---
spec: honey.grade
INPUT:
- MUST: run when the program's first command-line argument is grade
- MUST: treat the first record of standard input as a stage header and every record after it as one harvest record
  USES: ./honey.shared@honey.lines
- MUST: "interpret a well-formed harvest record as exactly three fields in order: a hive id, a gross weight, and a tare weight, where each weight is a non-empty run of ASCII digits (0-9) with no leading zero unless the weight is the single digit 0"
- USES: ./honey.tally@honey.tally::RETURN
RETURN:
- MUST: "write the line GRADED/1 to standard output as the first output line, before any record and exactly once, whenever the stage header is accepted"
- WHEN: a harvest record is accepted
  MUST: "write the record `<hive-id> <net> <band>` to standard output, where <net> is the hive's net weight and <band> is its grade band letter"
  USES: ./honey.shared@honey.lines
- MUST: compute a hive's net weight as its gross weight minus its tare weight
- MUST: "assign grade band A when net is 400 or greater; band B when net is from 200 to 399 inclusive; band C when net is from 1 to 199 inclusive"
- MUST: write the accepted records after the GRADED/1 line, in the same order as the harvest records on standard input
ERROR:
- WHEN: the first record of standard input is not exactly HARVEST/1
  MUST: "emit `E40 bad stage header: expected HARVEST/1` to standard error, write nothing to standard output, reject the entire input, and exit 2"
- WHEN: a well-formed harvest record has a net weight that is not strictly positive (its tare is greater than or equal to its gross)
  MUST: "emit `E50 nonpositive net: <hive-id>` to standard error, where <hive-id> is the record's first field; this contributes exit code 1"
- MUST: emit the residual error for any harvest record this stage cannot process that matches none of the guarded errors above
  USES: ./honey.shared@honey.errors
INVARIANT:
- MUST: keep processing the remaining harvest records after a record is rejected
- MUST: "exit 0 when the stage header is HARVEST/1 and every harvest record is accepted; exit 2 when the stage header is wrong; otherwise exit 1"
  USES: ./honey.shared@honey
SIDE-EFFECT:
- MUST-NOT: write a graded record to standard output for a harvest record that is rejected
- MUST-NOT: write an error line to standard error for a harvest record that is accepted
- MUST-NOT: write anything to standard output when the stage header is rejected
