# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  honey tally: the first pipeline stage. It reads raw hive-scan lines from
  standard input, validates each scan, and writes a normalized harvest record
  for every accepted scan to standard output for the grade stage to read.
version: v1
related:
- ./honey.shared.yass.yaml
- ./honey.grade.yass.yaml
---
spec: honey.tally
INPUT:
- MUST: run when the program's first command-line argument is tally
- MUST: treat each record of standard input as one raw hive scan
  USES: ./honey.shared@honey.lines
- MUST: "interpret a well-formed scan as exactly three fields in order: a hive id, a gross weight in grams, and a tare weight in grams"
RETURN:
- MUST: "write the line HARVEST/1 to standard output as the first output line, before any record and exactly once"
- WHEN: a scan is accepted
  MUST: "write the record `<hive-id> <gross> <tare>` to standard output, reusing the scan's own three field values unchanged"
  USES: ./honey.shared@honey.lines
- MUST: write the accepted records after the HARVEST/1 line, in the same order as the scans on standard input
ERROR:
- MUST: "validate a scan in this exact order, stopping at and emitting only the first failure: first the field count, then the hive id, then the gross weight, then the tare weight"
- WHEN: a scan does not split into exactly three fields
  MUST: "emit `E10 malformed scan: expected 3 fields, got <n>` to standard error, where <n> is the scan's actual field count; this contributes exit code 1"
- WHEN: the hive id is not well-formed
  MUST: "emit `E20 bad hive id: <hive-id>` to standard error; this contributes exit code 1"
- WHEN: the gross weight is not well-formed
  MUST: "emit `E21 bad gross: <gross>` to standard error; this contributes exit code 1"
- WHEN: the tare weight is not well-formed
  MUST: "emit `E22 bad tare: <tare>` to standard error; this contributes exit code 1"
- USES: ./honey.shared@honey.errors
INVARIANT:
- MUST: "treat a hive id as well-formed when it is 2 to 6 characters long, its first character is an ASCII uppercase letter (A-Z), and every character is an ASCII uppercase letter (A-Z) or an ASCII digit (0-9)"
- MUST: "treat a weight as well-formed when it is a non-empty run of ASCII digits (0-9) with no leading zero, unless the weight is the single digit 0"
- MUST: keep processing the remaining scans after a scan is rejected
- MUST: "exit 0 when every scan is accepted, otherwise exit 1"
  USES: ./honey.shared@honey
SIDE-EFFECT:
- MUST-NOT: write a record to standard output for a scan that is rejected
- MUST-NOT: write an error line to standard error for a scan that is accepted
