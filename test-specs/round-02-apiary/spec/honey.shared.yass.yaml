# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Shared conventions for the honey apiary harvest pipeline. The pipeline is one
  command-line program with three subcommands -- tally, grade, and pack -- each
  of which reads standard input and writes standard output, so the subcommands
  can be chained with shell pipes. This document owns the cross-cutting rules
  every subcommand obeys: how the program selects a subcommand, how a stage
  segments its standard input into records and fields, how a stage formats the
  standard output the next stage reads, how errors are written, and how a stage
  chooses its exit code.
version: v1
related:
- ./honey.tally.yass.yaml
- ./honey.grade.yass.yaml
- ./honey.pack.yass.yaml
---
spec: honey
INPUT:
- MUST: "treat the program's first command-line argument as the name of the subcommand to run: one of tally, grade, or pack"
- MUST: read all of standard input before writing any output
RETURN:
- MUST: run the behavior defined by the spec named for the selected subcommand
SIDE-EFFECT:
- MUST: write every result record to standard output and every error line to standard error
INVARIANT:
- MUST: exit 0 when the selected subcommand accepts every record in its input
- MUST: "exit 2 when the subcommand rejects its entire input because the input's stage header is wrong, having written nothing to standard output"
- MUST: otherwise exit 1 when the subcommand ran but rejected at least one record
---
spec: honey.lines
INPUT:
- MUST: "split standard input into records on a single newline byte (0x0A); each record is the text between newlines, in input order"
- MAY: accept a single trailing newline after the final record without counting it as an additional empty record
- MUST: treat a record that splits into zero fields as a blank record
- MUST: "treat completely empty standard input (zero bytes) as zero records"
- MUST: "split a record into fields on runs of one or more ASCII space bytes (0x20), discarding leading and trailing ASCII spaces, so that no empty field is produced"
- MUST-NOT: "treat any byte other than the ASCII space (0x20) -- including the tab (0x09), the carriage return (0x0D), or the non-breaking space (0xC2 0xA0) -- as a field separator; any such byte is ordinary field data"
RETURN:
- MUST: "format each output record as its fields joined by exactly one ASCII space (0x20) and terminated by a single newline byte (0x0A)"
- MUST: write output records in the same order as the input records they derive from
---
spec: honey.errors
ERROR:
- MUST: "write each error as one line to standard error: an error code, a single ASCII space, then a human-readable detail, terminated by a single newline byte (0x0A)"
- MUST: write at most one error line for any single input record
- MUST: when an input record matches more than one of a stage's guarded error conditions, emit only the error the stage lists first
- MUST: "use the residual error line `E90 unprocessable record: <record>` for a record a stage cannot process that matches none of that stage's guarded error conditions, where <record> is the offending input line exactly as it was read; the residual contributes exit code 1"
