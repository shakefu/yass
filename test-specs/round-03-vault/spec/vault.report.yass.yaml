# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  vault report: reads the verdict lines that vault certify writes to standard
  output and writes a five-line summary counting the doors inspected, the doors
  that passed, and the doors whose governing defect falls in each severity class.
  It is the consumer in the certify | report pipeline.
version: v1
related:
- ./vault.shared.yass.yaml
- ./vault.certify.yass.yaml
---
spec: vault.report
INPUT:
- MUST: run when the program's first command-line argument is report
- MUST: treat each record of standard input as one verdict line
  USES: ./vault.shared@vault.lines
- MUST: "read standard input as the verdict lines vault certify writes to standard output, one verdict per line; each line is either `<id> PASS` or `<id> <code> <message>` with a code defined in the defect registry; rely on that guarantee and do not re-validate the identifier, the field layout, or the message text"
  USES: ./vault.certify@vault.certify::RETURN
- MUST: "determine each verdict's severity class by looking up its code in the defect registry; a PASS verdict has no defect and no class"
  USES: ./vault.shared@vault.defects
RETURN:
- MUST: "write exactly five lines to standard output in this order: `DOORS <total>`, `PASS <passes>`, `CRITICAL <criticals>`, `MAJOR <majors>`, then `MINOR <minors>`"
- MUST: set <total> to the number of verdict lines read
- MUST: set <passes> to the number of verdict lines whose verdict is PASS
- MUST: "set <criticals>, <majors>, and <minors> to the number of verdict lines whose governing defect has severity class CRITICAL, MAJOR, and MINOR respectively"
  USES: ./vault.shared@vault.defects
- WHEN: standard input contains no verdict lines
  MUST: write the same five lines with every count equal to 0
SIDE-EFFECT:
- MUST-NOT: write to any file, network endpoint, or environment variable, and write nothing to standard error; read only standard input and write only standard output
INVARIANT:
- MUST: always exit with status 0
