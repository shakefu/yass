# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Shared conventions for the vault time-lock door annual-certification tool. The
  tool is one command-line program with two subcommands -- certify and report --
  each of which reads standard input and writes standard output, so they can be
  chained with a shell pipe. This document owns the cross-cutting rules every
  subcommand obeys: how the program selects a subcommand and what it does when the
  selection is absent or unknown, how a subcommand segments its standard input
  into records and fields, the layout of a door inspection record, the registry
  of inspection defects with their severity classes, messages, and precedence,
  and the shape of a processing-error line.
version: v1
related:
- ./vault.certify.yass.yaml
- ./vault.report.yass.yaml
---
spec: vault
INPUT:
- MUST: read all of standard input before writing any output
- WHEN: the first command-line argument is present and is exactly certify or report
  MUST: run that subcommand -- certify as defined by the vault.certify spec, report as defined by the vault.report spec
- SEE: ./vault.certify@vault.certify
- SEE: ./vault.report@vault.report
ERROR:
- WHEN: the first command-line argument is missing or is not exactly certify or report
  MUST: "write the line `usage: vault {certify|report}` to standard error, write nothing to standard output, and exit with status 2"
INVARIANT:
- MUST: "terminate every line written to standard output or standard error with a single newline byte (0x0A), and write no other line-terminator byte"
---
spec: vault.lines
INPUT:
- MUST: "split standard input into records on a single newline byte (0x0A); each record is the text between newlines, in input order"
- WHEN: standard input is completely empty, containing zero bytes
  MUST: treat it as zero records
- MAY: accept a single trailing newline after the final record without counting it as an additional empty record
- MUST: treat a record that splits into zero fields, such as a blank line between two records, as a record with zero fields
- MUST: "split a record into fields on runs of one or more ASCII space bytes (0x20), discarding leading and trailing ASCII spaces, so that no empty field is produced"
- MUST-NOT: "treat any byte other than the ASCII space (0x20) -- including the tab (0x09), the carriage return (0x0D), or the non-breaking space (0xC2 0xA0) -- as a field separator; any such byte is ordinary field data"
---
spec: vault.record
INPUT:
- MUST: "interpret a well-formed door inspection record as exactly nine fields in this order: a door identifier, then eight non-negative integers -- bolt-throw in millimetres, wall-thickness in millimetres, relocker count, drill-resistance in minutes, torch-resistance in minutes, time-lock in hours, service cycles, and audit-age in days"
- MUST: "treat a door identifier as well-formed only when it is 2 to 8 characters long, its first character is an ASCII uppercase letter (A-Z), and every character is an ASCII uppercase letter (A-Z) or an ASCII digit (0-9)"
- MUST: "treat an integer field as well-formed only when it is a non-empty run of ASCII digits (0-9) with no leading zero, unless the field is the single digit 0"
---
spec: vault.defects
INVARIANT:
- MUST: "V01 is a MAJOR defect: its condition is bolt-throw less than 20, and its message is `bolt throw below 20 mm minimum`"
- MUST: "V02 is a MINOR defect: its condition is bolt-throw greater than 80, and its message is `bolt throw above 80 mm maximum`"
- MUST: "V03 is a CRITICAL defect: its condition is wall-thickness less than 150, and its message is `wall thickness below 150 mm minimum`"
- MUST: "V04 is a MINOR defect: its condition is wall-thickness greater than 600, and its message is `wall thickness above 600 mm maximum`"
- MUST: "V05 is a CRITICAL defect: its condition is the relocker count less than 1, and its message is `relocker absent`"
- MUST: "V06 is a MINOR defect: its condition is the relocker count greater than 4, and its message is `relocker count above 4 maximum`"
- MUST: "V07 is a MAJOR defect: its condition is drill-resistance less than 30, and its message is `drill rating below 30 minute minimum`"
- MUST: "V08 is a MINOR defect: its condition is torch-resistance less than 15, and its message is `torch rating below 15 minute minimum`"
- MUST: "V09 is a MAJOR defect: its condition is time-lock less than 48, and its message is `time-lock below 48 hour minimum`"
- MUST: "V10 is a CRITICAL defect: its condition is time-lock greater than 168, and its message is `time-lock above 168 hour maximum`"
- MUST: "V11 is a MINOR defect: its condition is service cycles greater than 50000, and its message is `service interval exceeded above 50000 cycles`"
- MUST: "V12 is a MAJOR defect: its condition is audit-age greater than 365, and its message is `audit overdue beyond 365 days`"
- MUST: "V13 is a CRITICAL defect: its condition is drill-resistance less than torch-resistance, and its message is `drill rating below torch rating`"
- MUST: "V14 is a MAJOR defect: its condition is bolt-throw greater than wall-thickness, and its message is `bolt throw exceeds wall thickness`"
- MUST: "V15 is a MINOR defect: its condition is audit-age greater than 730, and its message is `audit overdue beyond 730 days`"
- MUST: "V16 is a CRITICAL defect: its condition is service cycles greater than 100000, and its message is `service interval exceeded above 100000 cycles`"
- MUST: "V17 is a MAJOR defect: its condition is torch-resistance less than 8, and its message is `torch rating below 8 minute floor`"
- MUST: "V18 is a MINOR defect: its condition is drill-resistance greater than 240, and its message is `drill rating above 240 minute maximum`"
- MUST: "when more than one defect condition holds for the same door, the governing defect is the earliest in this fixed precedence order, highest precedence first: V05, V13, V08, V01, V17, V03, V11, V10, V14, V07, V02, V16, V09, V06, V12, V18, V04, V15"
- MUST: "rank the severity classes for exit purposes as CRITICAL above MAJOR above MINOR, with exit contributions 3 for a CRITICAL defect, 2 for a MAJOR defect, and 1 for a MINOR defect"
---
spec: vault.errors
INVARIANT:
- MUST: "write every processing-error line to standard error as an error code, a single ASCII space, then a human-readable detail: `<code> <detail>`"
- MUST: write at most one processing-error line for any single input record
