# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  vault certify: reads raw door inspection records from standard input, checks
  each door against the inspection defect registry, and writes exactly one
  verdict line per well-formed door to standard output -- either that the door
  passes or naming the single governing defect. It is the producer in the
  certify | report pipeline.
version: v1
related:
- ./vault.shared.yass.yaml
- ./vault.report.yass.yaml
---
spec: vault.certify
INPUT:
- MUST: run when the program's first command-line argument is certify
- MUST: read each record of standard input as one door inspection record
  USES: ./vault.shared@vault.lines
- MUST: interpret each well-formed record by the shared door inspection record layout
  USES: ./vault.shared@vault.record
RETURN:
- WHEN: a record is well-formed and no defect condition holds for its door
  MUST: "write exactly one line `<door-id> PASS` to standard output, where <door-id> is the record's first field"
- WHEN: a record is well-formed and at least one defect condition holds for its door
  MUST: "write exactly one line `<door-id> <code> <message>` to standard output, naming the single governing defect selected by the registry precedence order, where <code> and <message> are that defect's code and message"
  USES: ./vault.shared@vault.defects
- MUST: write a standard-output line only for a well-formed record, and write at most one standard-output line per record
ERROR:
- MUST: "check each record in this exact order, stopping at and emitting only the first failure: first the field count, then the door identifier, then the integer fields"
- WHEN: a record does not split into exactly nine fields
  MUST: "emit `E10 malformed record: expected 9 fields, got <n>` to standard error, where <n> is the record's actual field count, and write no standard-output line for that record"
- WHEN: a record has exactly nine fields but its first field is not a well-formed door identifier
  MUST: "emit `E15 bad door id: <door-id>` to standard error, where <door-id> is the first field, and write no standard-output line for that record"
- WHEN: a record has exactly nine fields and a well-formed door identifier but at least one of its eight integer fields is not a well-formed integer
  MUST: "emit `E20 bad number: <token>` to standard error, where <token> is the first such field in left-to-right order, and write no standard-output line for that record"
- USES: ./vault.shared@vault.errors
SIDE-EFFECT:
- MUST-NOT: write to any file, network endpoint, or environment variable; read only standard input and write only standard output and standard error
- MUST-NOT: write a verdict line to standard output for a record that fails any check
- MUST-NOT: write an error line to standard error for a well-formed record
INVARIANT:
- MUST: "classify every record as exactly one of the following: malformed by the field-count, door-identifier, or integer check, in which case it yields one error line and no verdict line; or well-formed, in which case it yields exactly one verdict line and no error line"
- MUST: keep processing the remaining records after a record is rejected
- MUST: "exit with the maximum exit contribution taken over all records, where a PASS door contributes 0, any malformed record contributes 1, a MINOR defect contributes 1, a MAJOR defect contributes 2, and a CRITICAL defect contributes 3; exit 0 when there are no records"
  USES: ./vault.shared@vault.defects
