# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Shared conventions for the axle wayside hotbox-detector audit tool. The tool is
  one command-line program with two subcommands -- audit and roster -- each of
  which reads standard input and writes standard output, so they can be chained
  with a shell pipe. This document owns the cross-cutting rules every subcommand
  obeys: how the program selects a subcommand and what it does when the selection
  is absent or unknown, how a subcommand segments its standard input into records
  and fields, the layout of an axle reading record, the registry of bearing
  defects with their severity classes, messages, and precedence, and the shape of
  a processing-error line.
version: v1
related:
- ./axle.audit.yass.yaml
- ./axle.roster.yass.yaml
---
spec: axle
INPUT:
- MUST: read all of standard input before writing any output
- WHEN: the first command-line argument is present and is exactly audit or roster
  MUST: run that subcommand -- audit as defined by the axle.audit spec, roster as defined by the axle.roster spec
- SEE: ./axle.audit@axle.audit
- SEE: ./axle.roster@axle.roster
ERROR:
- WHEN: the first command-line argument is missing or is not exactly audit or roster
  MUST: "write the line `usage: axle {audit|roster}` to standard error, write nothing to standard output, and exit with status 2"
INVARIANT:
- MUST: "terminate every line written to standard output or standard error with a single newline byte (0x0A), and write no other line-terminator byte"
- MUST: encode all output as UTF-8
---
spec: axle.lines
INPUT:
- MUST: "split standard input into records on a single newline byte (0x0A); each record is the text between newlines, in input order"
- WHEN: standard input is completely empty, containing zero bytes
  MUST: treat it as zero records
- MAY: accept a single trailing newline after the final record without counting it as an additional empty record
- MUST: treat a record that splits into zero fields, such as a blank line between two records, as a record with zero fields
- MUST: "split a record into fields on runs of one or more ASCII space bytes (0x20), discarding leading and trailing ASCII spaces, so that no empty field is produced"
- MUST-NOT: "treat any byte other than the ASCII space (0x20) -- including the tab (0x09), the carriage return (0x0D), or the non-breaking space (0xC2 0xA0) -- as a field separator; any such byte is ordinary field data"
---
spec: axle.record
INPUT:
- MUST: "interpret a well-formed axle reading record as exactly seven fields in this order: an axle identifier, then six non-negative integers -- bearing-temp as a degree-Celsius rise, ambient-temp, mate-temp as the same-side opposite axle rise, wheel-impact in kilonewtons, load in tonnes, and mileage in thousands of miles since reprofile"
- MUST: "treat an axle identifier as well-formed only when it is 3 to 10 characters long, its first character is an ASCII uppercase letter (A-Z), and every character is an ASCII uppercase letter (A-Z) or an ASCII digit (0-9)"
- MUST: "treat an integer field as well-formed only when it is a non-empty run of ASCII digits (0-9) with no leading zero, unless the field is the single digit 0"
---
spec: axle.defects
INVARIANT:
- MUST: "H01 is a MAJOR defect: its condition is bearing-temp greater than 80, and its message is `bearing temp above 80 absolute alarm`"
- MUST: "H02 is a MINOR defect: its condition is bearing-temp greater than 60, and its message is `bearing temp above 60 warning`"
- MUST: "H03 is a CRITICAL defect: its condition is bearing-temp minus ambient-temp greater than 70, and its message is `differential above 70 hotbox`"
- MUST: "H04 is a MAJOR defect: its condition is bearing-temp minus ambient-temp greater than 50, and its message is `differential above 50 alarm`"
- MUST: "H05 is a MAJOR defect: its condition is bearing-temp minus mate-temp greater than 40, and its message is `side-to-side differential above 40`"
- MUST: "H06 is a CRITICAL defect: its condition is bearing-temp greater than 100, and its message is `bearing temp above 100 burnoff`"
- WHEN: mileage greater than 200
  MUST: "H07 is a MINOR defect: its condition is bearing-temp minus mate-temp greater than 25, and its message is `aged bearing side differential above 25`"
- MUST: "H08 is a MAJOR defect: its condition is wheel-impact greater than 140, and its message is `wheel impact above 140 kN alarm`"
- MUST: "H09 is a CRITICAL defect: its condition is wheel-impact greater than 200, and its message is `wheel impact above 200 kN critical`"
- MUST: "H10 is a MINOR defect: its condition is wheel-impact greater than 90, and its message is `wheel impact above 90 kN warning`"
- MUST: "H11 is a MINOR defect: its condition is load greater than 130, and its message is `load above 130 tonne limit`"
- MUST: "H12 is a MAJOR defect: its condition is mileage greater than 280, and its message is `reprofile overdue beyond 280`"
- MUST: "when more than one defect condition holds for the same axle, the governing defect is the earliest in this fixed precedence order, highest precedence first: H06, H09, H03, H08, H01, H05, H04, H12, H02, H11, H10, H07"
- MUST: "rank the severity classes for exit purposes as CRITICAL above MAJOR above MINOR, with exit contributions 3 for a CRITICAL defect, 2 for a MAJOR defect, and 1 for a MINOR defect"
---
spec: axle.errors
INVARIANT:
- MUST: "write every processing-error line to standard error as an error code, a single ASCII space, then a human-readable detail: `<code> <detail>`"
- MUST: write at most one processing-error line for any single input record
- WHEN: "an error line carries the code E90"
  MUST: read it as the guard-less residual policy for any record that no E10, E15, or E20 guard rejects
