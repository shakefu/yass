# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  axle roster: reads the verdict lines that axle audit writes to standard output,
  plus hand-fed re-inspection lines, and writes a five-line summary counting the
  axles inspected, the axles that are clear, and the axles whose governing defect
  falls in each severity class. It is the consumer in the audit | roster pipeline.
version: v1
related:
- ./axle.shared.yass.yaml
- ./axle.audit.yass.yaml
---
spec: axle.roster
INPUT:
- MUST: run when the program's first command-line argument is roster
- MUST: treat each record of standard input as one line
  USES: ./axle.shared@axle.lines
- MUST: "distinguish the two line types by the first field: a re-inspection line has the literal RECHECK as its first field; every other non-empty line is a verdict line"
- MUST: "read a verdict line as the text audit writes, either `<axle-id> CLEAR` or `<axle-id> <code> <message>`; trust the verdict text and tally by it, and do not re-validate the identifier, the field count, or the message, nor re-derive the verdict"
  USES: ./axle.audit@axle.audit::RETURN
- WHEN: a verdict line does not match the shape audit guarantees, such as a CLEAR or coded line of the wrong field count
  MUST: still count it toward the axle total and tally it by its stated second field, treating a second field that is neither CLEAR nor a registry code as contributing to no severity class
- CONFORMS: ./axle.audit@axle.audit
- MUST: "read a re-inspection line as `RECHECK <axle-id> <flag> <bearing-temp> <ambient-temp> <mate-temp> <wheel-impact> <load> <mileage>`, where <flag> is Y or N, and count it toward the axle total"
- WHEN: a re-inspection line is flagged Y
  MUST: re-derive the single governing defect for the axle from its six readings by the registry, and tally the axle by that defect's severity class, or as clear when no defect governs
  CONFORMS: ./axle.shared@axle.defects::INVARIANT
- WHEN: a re-inspection line is flagged N
  MUST: tally the axle as clear without re-deriving any defect
RETURN:
- MUST: "write exactly five lines to standard output in this order: `AXLES <total>`, `CLEAR <clears>`, `CRITICAL <criticals>`, `MAJOR <majors>`, then `MINOR <minors>`"
- MUST: set <total> to the number of lines read, counting both verdict lines and re-inspection lines
- MUST: set <clears> to the number of axles tallied as clear
- MUST: "set <criticals>, <majors>, and <minors> to the number of axles whose governing defect has severity class CRITICAL, MAJOR, and MINOR respectively"
  CONFORMS: ./axle.shared@axle.defects::INVARIANT
- WHEN: standard input contains no lines
  MUST: write the same five lines with every count equal to 0
SIDE-EFFECT:
- MUST-NOT: write to any file, network endpoint, or environment variable, and write nothing to standard error; read only standard input and write only standard output
INVARIANT:
- MUST: always exit with status 0
