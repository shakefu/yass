# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  axle audit: reads raw axle reading records from standard input, checks each axle
  against the bearing defect registry, and writes exactly one verdict line per
  well-formed axle to standard output -- either that the axle is clear or naming
  the single governing defect. It is the producer in the audit | roster pipeline.
version: v1
related:
- ./axle.shared.yass.yaml
- ./axle.roster.yass.yaml
---
spec: axle.audit
INPUT:
- MUST: run when the program's first command-line argument is audit
- MUST: read each record of standard input as one axle reading record
  USES: ./axle.shared@axle.lines
- MUST: validate each record against the shared axle reading record format, enforcing the field count, the axle identifier rule, and the integer rule
  CONFORMS: ./axle.shared@axle.record::INPUT
RETURN:
- WHEN: a record is well-formed and no defect condition holds for its axle
  MUST: "write exactly one line `<axle-id> CLEAR` to standard output, where <axle-id> is the record's first field"
- WHEN: a record is well-formed and at least one defect condition holds for its axle
  MUST: "write exactly one line `<axle-id> <code> <message>` to standard output, where <code> and <message> are those of the single governing defect"
- MUST: select the single governing defect by the registry precedence order, and contribute its severity class to the exit status
  CONFORMS: ./axle.shared@axle.defects::INVARIANT
- MUST: write a standard-output line only for a well-formed record, and write at most one standard-output line per record
ERROR:
- MUST: "check each record in this exact order, stopping at and emitting only the first failure: first the field count, then the axle identifier, then the integer fields"
- WHEN: a record does not split into exactly seven fields
  MUST: "emit `E10 malformed record: expected 7 fields, got <n>` to standard error, where <n> is the record's actual field count, and write no standard-output line for that record"
- WHEN: a record has exactly seven fields but its first field is not a well-formed axle identifier
  MUST: "emit `E15 bad axle id: <axle-id>` to standard error, where <axle-id> is the first field, and write no standard-output line for that record"
- WHEN: a record has exactly seven fields and a well-formed axle identifier but at least one of its six integer fields is not a well-formed integer
  MUST: "emit `E20 bad number: <token>` to standard error, where <token> is the first such field in left-to-right order, and write no standard-output line for that record"
- MUST: "emit `E90 unprocessable record: <record>` to standard error as the guard-less residual for any record that the field-count, identifier, and integer checks all leave unrejected, where <record> is the input line exactly as read"
- USES: ./axle.shared@axle.errors
SIDE-EFFECT:
- MUST-NOT: write to any file, network endpoint, or environment variable; read only standard input and write only standard output and standard error
- MUST-NOT: write a verdict line to standard output for a record that fails any check
- MUST-NOT: write an error line to standard error for a well-formed record
INVARIANT:
- MUST: "classify every record as exactly one of the following: malformed by the field-count, identifier, or integer check, in which case it yields one error line and no verdict line; or well-formed, in which case it yields exactly one verdict line and no error line"
- MUST: keep processing the remaining records after a record is rejected
- MUST: "exit with the maximum exit contribution taken over all records, where a CLEAR axle contributes 0, any malformed record contributes 1, a MINOR defect contributes 1, a MAJOR defect contributes 2, and a CRITICAL defect contributes 3; exit 0 when there are no records"
  CONFORMS: ./axle.shared@axle.defects::INVARIANT
