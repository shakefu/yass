# yaml-language-server: $schema=https://textla.dev/yass/v1.schema.json
---
description: >
  Reference tables for the `berth` program: the error registry and the dock table.
  The error registry lists every error in priority order, each entry packing its
  code, meaning, the exact message written to standard error, and the exit code it
  contributes. The dock table gives each dock letter its capacity, operating hours,
  and open or closed status.
version: v1
related:
- ./berth.yass.yaml
---
spec: berth.errors
ERROR:
- WHEN: a record does not split into exactly five fields
  MUST: "emit `E10 malformed record: expected 5 fields, got <n>` to standard error, where <n> is the actual number of fields; this contributes exit code 2"
- WHEN: ship-id is not well-formed
  MUST: "emit `E20 bad ship id: <ship-id>` to standard error; this contributes exit code 1"
- WHEN: dock-code is not well-formed
  MUST: "emit `E21 bad dock code: <dock-code>` to standard error; this contributes exit code 1"
- WHEN: mass is not well-formed
  MUST: "emit `E22 bad mass: <mass>` to standard error; this contributes exit code 1"
- WHEN: the window is not well-formed
  MUST: "emit `E23 bad window: <window-start>-<window-end>` to standard error; this contributes exit code 1"
- WHEN: the dock letter is closed
  MUST: "emit `E30 dock closed: <dock-code>` to standard error; this contributes exit code 1"
- WHEN: mass exceeds the dock capacity
  MUST: "emit `E31 over capacity: <dock-code> mass <mass> exceeds <capacity>` to standard error; this contributes exit code 1"
- WHEN: the window conflicts with an earlier accepted record on the same dock letter
  MUST: "emit `E32 window conflict: <dock-code> <window-start>-<window-end>` to standard error; this contributes exit code 1"
- MUST: "as a catch-all, emit `E90 unprocessable: <dock-code> <window-start>-<window-end>` to standard error for any record that cannot be accepted but that matches none of the errors listed above; this contributes exit code 1"
INVARIANT:
- MUST: emit at most one error line per record
- MUST: when a record matches more than one error, emit the one listed earliest above
---
spec: berth.docks
INVARIANT:
- MUST: "dock A has capacity 500 tonnes and operates from slot 12 inclusive to slot 36 exclusive"
- MUST: "dock B has capacity 800 tonnes and operates from slot 0 inclusive to slot 48 exclusive"
- MUST: "dock C has capacity 1200 tonnes and operates from slot 16 inclusive to slot 40 exclusive"
- MUST: "dock D has capacity 300 tonnes and operates from slot 12 inclusive to slot 36 exclusive"
- MUST: "dock E has capacity 1000 tonnes and operates from slot 8 inclusive to slot 44 exclusive"
- MUST: dock F is closed and accepts no records
- MUST: a record exceeds capacity when its mass in tonnes is strictly greater than its dock letter's capacity
- MUST: "a record is within operating hours when window-start is at or after the dock's opening slot and window-end is at or before the dock's closing slot"
